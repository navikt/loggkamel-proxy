apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: loggkamel-proxy
  namespace: sikkerhetstjenesten
spec:
  ingresses:
    - https://loggkamel-proxy.dev.intern.nav.no
  image: {{image}}
  port: 8080
  replicas:
    max: 2
    min: 1
  resources:
    requests:
      cpu: 20m
      memory: 640Mi
  observability:
    logging:
      destinations:
        - id: loki