apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: loggkamel-proxy
  namespace: sikkerhetstjenesten
  labels:
    team: sikkerhetstjenesten
spec:
  azure:
    application:
      enabled: true
      allowAllUsers: true
  ingresses:
    {{#each ingresses as |ingress|}}
       - {{ingress}}
      {{/each}}
  image: {{image}}
  observability:
    logging:
      destinations:
        - id: loki
        - id: elastic
    autoInstrumentation:
      enabled: true
      runtime: java
  prometheus:
    enabled: true
    path: /monitoring/prometheus
  readiness:
    path: /monitoring/health/readiness
    initialDelay: 30
  liveness:
    path: /monitoring/health/liveness
    initialDelay: 30
  port: 8080
  replicas:
    max: {{replica.max}}
    min: {{replica.min}}
  resources:
    limits:
      memory: '{{mem.max}}'
    requests:
      cpu: '{{cpu.min}}'
      memory: '{{mem.min}}'
  terminationGracePeriodSeconds: 60
  env:
    - name: NAIS_CLUSTER_TYPE
      value: {{nais.cluster.type}}